name: Deploy portfolio to GitHub Pages

# Builds the static export and publishes it to GitHub Pages.
# One-time setup: repo → Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push to the branch below
# re-deploys automatically.

on:
  push:
    branches: [claude/portfolio-design-plan-9ol8sb]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          # Serve correctly from https://<user>.github.io/peter-misiati/
          PAGES_BASE_PATH: /peter-misiati
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
