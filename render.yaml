# Render Blueprint — deploys the static export as a Render Static Site.
# In Render: New + → Blueprint → connect this repo, or create a Static Site
# manually with the same build command and publish path.
services:
  - type: web
    runtime: static
    name: facilitator-misiati
    buildCommand: npm ci && npm run build
    staticPublishPath: out
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
    headers:
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
